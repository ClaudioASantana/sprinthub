version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sprinthub_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: sprinthub_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sprinthub_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: sprinthub_postgres_data
